<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome back</title>
    <link rel="stylesheet" href="/page-1/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <main class="page-shell">
        <form class="form-container" method="get">
            <fieldset class="form-content">
                <legend class="form-content-header"><img class="welcome-image" src="../assets/Welcome.svg" alt="Welcome illustration"><span class="sub-welcome">Let's Dive In</span>
                </legend>

                <label for="name" class="form-label form-tittle-name">Name: </label>
                <input class="form-input form-content-username" id="name" name="name" type="text" placeholder="User name" autocomplete="name">
                
                <label for="password" class="form-label form-tittle-password">Password: </label>
                <input class="form-input form-content-password" id="password" name="password" type="password" placeholder="Password" autocomplete="current-password" required>
          <a class="button-signup" href="../page-2/index.html" target="_self" id="page-2-btn1">Sign Up</a>
                <span class="form-inline-text">Already have an account?</span>
                <a class="button-login" href="../page-2/index.html" target="_self" id="page-2-btn2">Log In</a>
            </fieldset>

        </form>

        <img class="side-image" src="../assets/Rectangle 4.png" alt="A decorative image that supports the page design">
        <img class="vector-deco" src="../assets/Vector.svg" alt="">
    </main>
</body>

</html>
