<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rakib Hassan | Portfolio Entry</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <main class="page-shell">
        <section class="intro-panel">
            <form class="form-container" method="get">
                <fieldset class="form-content">
                    <legend class="form-content-header">
                        <img class="welcome-image" src="assets/Welcome.svg" alt="Welcome illustration">
                        <span class="sub-welcome">Welcome to my portfolio</span>
                    </legend>

                    <p class="intro-copy">A focused front-end portfolio entry built to preview interface design, responsive layout, and interaction polish.</p>

                    <label for="name" class="form-label">Name</label>
                    <input class="form-input" id="name" name="name" type="text" placeholder="Your name" autocomplete="name">

                    <label for="focus" class="form-label">Current focus</label>
                    <input class="form-input" id="focus" name="focus" type="text" placeholder="Front-end development" autocomplete="off">

                    <a class="button-signup" href="page-2/index.html" target="_self" id="page-2-btn1">Enter portfolio</a>
                    <span class="form-inline-text">This prototype includes interactive navigation, project detail modals, theme switching, and contact form feedback.</span>
                    <a class="button-login" href="page-2/index.html#projects" target="_self" id="page-2-btn2">Jump to projects</a>
                </fieldset>
            </form>
        </section>

        <section class="visual-panel" aria-hidden="true">
            <img class="side-image" src="assets/Rectangle 4.png" alt="A decorative image that supports the page design">
            <img class="vector-deco" src="assets/Vector.svg" alt="">
        </section>
    </main>
</body>
</html>
